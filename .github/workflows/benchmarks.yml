name: Benchmarks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  benchmark:
    name: Criterion & Dask Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Run Criterion benchmarks and compare against the base branch.
      - name: Criterion benchmark comparison
        uses: boa-dev/criterion-compare-action@v3
        with:
          benchName: "model_bench"
          branchName: ${{ github.base_ref || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Run the Python/dask benchmark.
      - name: Dask generate benchmark
        run: |
          uv run --dev \
            --config-setting 'build-args=--profile=release' \
            python benchmarks/benchmark_generate.py
