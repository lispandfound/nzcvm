name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Clippy (Rust linter)
        run: cargo test

      - name: pytest
        run: uv run --dev --config-setting 'build-args=--profile=dev' pytest tests/ -v

      - name: Clippy (Rust linter)
        run: cargo clippy -- -D warnings

      - name: Ruff (Python linter)
        run: uv run --dev --config-setting 'build-args=--profile=dev' ruff check .

      - name: ty (Python type checker)
        run: uv run --dev --config-setting 'build-args=--profile=dev' ty check nzcvm/

