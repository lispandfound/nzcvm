[package]
name = "nzcvm"
version = "0.1.0"
edition = "2024"

[lib]
name = "nzcvm"
crate-type = ["cdylib"]

[dependencies]
bvh = {version = "0.12.0"}
byteorder = "1.5.0"
geo = "0.32.0"
geozero = {version = "0.15.1", features = ["with-wkb"]}
hdf5-metno = "0.12.3"
hdf5-metno-sys = "0.11.2"
nalgebra = "0.34.2"
ndarray = { version = "0.17.2", features = ["approx", "rayon"] }
numpy = "0.28.0"
ordered-float = "5.3.0"
pyo3 = "0.28.2"
rayon = "1.11.0"
scirs2-interpolate = "0.4.1"

[dev-dependencies]
tempfile = "3.27.0"
approx = "0.5.1"
